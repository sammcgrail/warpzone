server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    absolute_redirect off;
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # iOS probes these at the origin root regardless of <link> tags — must return
    # an image (or 204), never the HTML shell, or Safari's progress bar hangs.
    location = /favicon.ico { try_files /favicon.png =204; }
    location = /apple-touch-icon.png { try_files /favicon.png =204; }
    location = /apple-touch-icon-precomposed.png { try_files /favicon.png =204; }

    location / { try_files $uri $uri/index.html $uri/ /index.html; }
}
